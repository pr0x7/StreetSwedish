name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Schemes
        run: xcodebuild -list

      - name: Build App for iOS (Unsigned)
        run: |
          xcodebuild -scheme StreetSwedish \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build > xcodebuild.log 2>&1

      - name: Create IPA Package
        run: |
          mkdir Payload
          APP_PATH=$(find build -name "*.app" -type d -print -quit)
          if [ -n "$APP_PATH" ]; then
            echo "Found app bundle at: $APP_PATH"
            cp -r "$APP_PATH" Payload/
          else
            echo "No .app bundle found! Creating a fallback app bundle wrapper..."
            mkdir -p Payload/StreetSwedish.app
            cp build/Build/Products/Release-iphoneos/StreetSwedish Payload/StreetSwedish.app/
            
            # Compile Assets (including AppIcon) using actool
            echo "Compiling asset catalog..."
            xcrun actool --compile Payload/StreetSwedish.app \
              --platform iphoneos \
              --minimum-deployment-target 16.0 \
              --app-icon AppIcon \
              --output-format xml1 \
              StreetSwedish/Assets.xcassets
            
            echo "Writing Info.plist..."
            echo '<?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key>
                <string>StreetSwedish</string>
                <key>CFBundleIdentifier</key>
                <string>com.pr0x7.StreetSwedish</string>
                <key>CFBundleName</key>
                <string>StreetSwedish</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleShortVersionString</key>
                <string>1.0.0</string>
                <key>CFBundleVersion</key>
                <string>1</string>
                <key>LSRequiresIPhoneOS</key>
                <true/>
                <key>MinimumOSVersion</key>
                <string>16.0</string>
                <key>CFBundleSupportedPlatforms</key>
                <array>
                    <string>iPhoneOS</string>
                </array>
                <key>UIDeviceFamily</key>
                <array>
                    <integer>1</integer>
                </array>
                <key>UILaunchScreen</key>
                <dict/>
                <key>CFBundleIcons</key>
                <dict>
                    <key>CFBundlePrimaryIcon</key>
                    <dict>
                        <key>CFBundleIconFiles</key>
                        <array>
                            <string>AppIcon60x60</string>
                        </array>
                        <key>CFBundleIconName</key>
                        <string>AppIcon</string>
                    </dict>
                </dict>
            </dict>
            </plist>' > Payload/StreetSwedish.app/Info.plist
          fi
          zip -r StreetSwedish.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: StreetSwedish-Unsigned-IPA
          path: StreetSwedish.ipa

      - name: Upload Build Log on Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Xcodebuild-Log
          path: xcodebuild.log

      - name: Print Xcodebuild Log on Failure
        if: failure()
        run: cat xcodebuild.log

      - name: List Release Directory on Failure
        if: failure()
        run: |
          find build/Build/Products/Release-iphoneos -maxdepth 3 > release_contents.txt || true
          cat release_contents.txt || true

      - name: Commit build log on failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xcodebuild.log release_contents.txt
          git commit -m "chore: add build failure log [skip ci]" || exit 0
          git push
