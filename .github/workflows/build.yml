name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Schemes
        run: xcodebuild -list

      - name: Build App for iOS (Unsigned)
        run: |
          xcodebuild -scheme StreetSwedish \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build > xcodebuild.log 2>&1

      - name: Create IPA Package
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/StreetSwedish.app Payload/
          zip -r StreetSwedish.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: StreetSwedish-Unsigned-IPA
          path: StreetSwedish.ipa

      - name: Upload Build Log on Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Xcodebuild-Log
          path: xcodebuild.log

      - name: Print Xcodebuild Log on Failure
        if: failure()
        run: cat xcodebuild.log

      - name: List Release Directory on Failure
        if: failure()
        run: |
          find build/Build/Products/Release-iphoneos -maxdepth 3 > release_contents.txt || true
          cat release_contents.txt || true

      - name: Commit build log on failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xcodebuild.log release_contents.txt
          git commit -m "chore: add build failure log [skip ci]" || exit 0
          git push
