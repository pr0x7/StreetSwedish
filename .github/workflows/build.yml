name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Schemes
        run: xcodebuild -list

      - name: Build App for iOS (Unsigned)
        run: |
          xcodebuild -scheme StreetSwedish \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build > xcodebuild.log 2>&1

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "*.app" -type d -print -quit)
          if [ -n "$APP_PATH" ]; then
            echo "Found app bundle at: $APP_PATH"
            cp -r "$APP_PATH" Payload/
          else
            echo "No .app bundle found! Creating a fallback app bundle wrapper..."
            mkdir -p Payload/StreetSwedish.app
            cp build/Build/Products/Release-iphoneos/StreetSwedish Payload/StreetSwedish.app/
            
            # Copy resource bundle into the app wrapper so SPM resources can load
            if [ -d "build/Build/Products/Release-iphoneos/StreetSwedish_StreetSwedish.bundle" ]; then
              echo "Copying StreetSwedish_StreetSwedish.bundle to app bundle..."
              cp -r build/Build/Products/Release-iphoneos/StreetSwedish_StreetSwedish.bundle Payload/StreetSwedish.app/
            fi
            
            # Create a basic Info.plist for the fallback
            echo '<?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key>
                <string>StreetSwedish</string>
                <key>CFBundleIdentifier</key>
                <string>com.pr0x7.StreetSwedish</string>
                <key>CFBundleName</key>
                <string>StreetSwedish</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleShortVersionString</key>
                <string>1.0.0</string>
                <key>CFBundleVersion</key>
                <string>1</string>
                <key>LSRequiresIPhoneOS</key>
                <true/>
                <key>MinimumOSVersion</key>
                <string>16.0</string>
                <key>CFBundleSupportedPlatforms</key>
                <array>
                    <string>iPhoneOS</string>
                </array>
                <key>UIDeviceFamily</key>
                <array>
                    <integer>1</integer>
                </array>
                <key>UILaunchScreen</key>
                <dict/>
            </dict>
            </plist>' > Payload/StreetSwedish.app/Info.plist
          fi
          
          # Target the final app bundle in Payload/
          FINAL_APP=$(find Payload -name "*.app" -type d -print -quit)
          echo "Targeting app bundle for icon injection: $FINAL_APP"
          
          # Compile the asset catalog containing the AppIcon into the bundle using actool
          echo "Compiling asset catalog with actool..."
          xcrun actool --compile "$FINAL_APP" \
            --platform iphoneos \
            --minimum-deployment-target 16.0 \
            --target-device iphone \
            --target-device ipad \
            --app-icon AppIcon \
            --output-partial-info-plist "$(pwd)/partial.plist" \
            --output-format xml1 \
            "$(pwd)/StreetSwedish/Assets.xcassets" > actool.log 2>&1 || { cat actool.log; exit 1; }
          cat actool.log
            
          # Inject CFBundleIcons into Info.plist
          echo "Injecting CFBundleIcons plist configuration..."
          plutil -remove CFBundleIcons "$FINAL_APP/Info.plist" || true
          plutil -insert CFBundleIcons -xml '<dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>AppIcon20x20</string><string>AppIcon29x29</string><string>AppIcon40x40</string><string>AppIcon60x60</string></array><key>CFBundleIconName</key><string>AppIcon</string></dict></dict>' "$FINAL_APP/Info.plist"
          
          # Print the final Info.plist to build logs for verification
          echo "Final Info.plist:"
          plutil -p "$FINAL_APP/Info.plist"
          
          # Print the files in the app bundle to verify compiled icon assets
          echo "Files inside the compiled app bundle:"
          find "$FINAL_APP" -maxdepth 3
          
          zip -r StreetSwedish.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: StreetSwedish-Unsigned-IPA
          path: StreetSwedish.ipa

      - name: Upload Build Log on Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Xcodebuild-Log
          path: xcodebuild.log

      - name: Print Xcodebuild Log on Failure
        if: failure()
        run: cat xcodebuild.log

      - name: List Release Directory
        if: always()
        run: |
          find build/Build/Products/Release-iphoneos -maxdepth 3 > release_contents.txt || true
          if [ -d Payload/StreetSwedish.app ]; then
            echo "=== Files inside Payload/StreetSwedish.app ===" >> release_contents.txt
            find Payload/StreetSwedish.app -maxdepth 3 >> release_contents.txt || true
            echo "=== Info.plist ===" >> release_contents.txt
            plutil -p Payload/StreetSwedish.app/Info.plist >> release_contents.txt || true
          fi
          if [ -f actool.log ]; then
            echo "=== actool.log ===" >> release_contents.txt
            cat actool.log >> release_contents.txt || true
          fi
          cat release_contents.txt || true

      - name: Commit build log
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xcodebuild.log release_contents.txt
          git commit -m "chore: update build log and release contents [skip ci]" || exit 0
          git push
